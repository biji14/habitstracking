<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Habits</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAFAF7; --card: #FFFFFF; --ink: #1A1A17; --muted: #6B6B63;
    --hair: #E8E6E0; --hair-strong: #D8D6CE;
    --deal: #4C6EF5; --deal-bg: #EDF0FE;
    --social: #7048E8; --social-bg: #F0ECFD;
    --money: #0CA678; --money-bg: #E5F6F0;
    --basics: #E8940C; --basics-bg: #FCF2E2;
  }
  body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px; flex-wrap: wrap; gap: 6px; }
  h1 { font-size: 24px; font-weight: 650; letter-spacing: -0.02em; }
  .date { font-size: 12px; color: var(--muted); }
  .next-card { background: var(--ink); color: #FAFAF7; border-radius: 14px; padding: 14px 16px; margin: 14px 0 18px; }
  .next-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; opacity: 0.6; margin-bottom: 3px; }
  .next-text { font-size: 15px; font-weight: 500; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 1px solid var(--hair); border-radius: 12px; padding: 10px 12px; }
  .stat .num { font-size: 22px; font-weight: 650; letter-spacing: -0.02em; }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .weeknav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .weeknav button { background: var(--card); border: 1px solid var(--hair-strong); border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; }
  .weeknav button:active { background: var(--hair); }
  .weeklabel { font-size: 13px; font-weight: 550; text-align: center; }
  .lane { background: var(--card); border: 1px solid var(--hair); border-radius: 14px; padding: 12px 12px; margin-bottom: 10px; }
  .lane-head { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lane-title { font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
  .lane-pct { margin-left: auto; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .dayhead { display: grid; grid-template-columns: minmax(0,1fr) repeat(7, 32px); gap: 3px; margin-bottom: 5px; }
  .dayhead span { font-size: 9px; color: var(--muted); text-align: center; }
  .habit { display: grid; grid-template-columns: minmax(0,1fr) repeat(7, 32px); gap: 3px; align-items: center; margin-bottom: 4px; }
  .habit-name { font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 2px; }
  .box { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--hair-strong); cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; transition: transform 0.08s; background: #fff; }
  .box:active { transform: scale(0.85); }
  .box.today { border-color: var(--ink); border-style: dashed; }
  .box svg { width: 16px; height: 16px; display: none; pointer-events: none; }
  .box.on svg { display: block; }
  .footnote { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; padding-bottom: env(safe-area-inset-bottom); }
  .reset { background: none; border: none; color: var(--muted); text-decoration: underline; cursor: pointer; font-size: 11px; font-family: inherit; }
  @media (min-width: 480px) {
    .habit-name, .lane-title { font-size: 14px; }
    .habit, .dayhead { grid-template-columns: minmax(0,1fr) repeat(7, 34px); gap: 5px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Habits</h1>
    <span class="date" id="today-date"></span>
  </div>

  <div id="app"></div>

  <p class="footnote">
    Data saves automatically in this browser on this device.<br>
    <button class="reset" id="reset-btn">Reset all data</button>
  </p>
</div>

<script>
const LANES = [
  { id: 'deal', title: 'DISTRIBUTION DEAL', color: '#4C6EF5', bg: '#EDF0FE', timeSensitive: true,
    habits: ['Work on supplier list', 'Research pricing / MOQ'] },
  { id: 'social', title: 'SOCIAL BRAND', color: '#7048E8', bg: '#F0ECFD',
    habits: ['Create or post content', '15 min content ideas'] },
  { id: 'money', title: 'MONEY & INVESTING', color: '#0CA678', bg: '#E5F6F0',
    habits: ['Log expenses', 'Check investments'] },
  { id: 'basics', title: 'DAILY BASICS', color: '#E8940C', bg: '#FCF2E2',
    habits: ['Gym', 'German learning', 'Read / learn 15 min'] },
];
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="COLORVAR" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const KEY = 'habit_data_v1';

let state = {};
let weekOffset = 0;

function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(offset){
  const d = new Date(); d.setHours(0,0,0,0);
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day + offset*7);
  return d;
}
function weekDates(offset){
  const m = mondayOf(offset); const out=[];
  for(let i=0;i<7;i++){ const x=new Date(m); x.setDate(m.getDate()+i); out.push(x); }
  return out;
}
function k(dateStr, lane, habit){ return dateStr+'|'+lane+'|'+habit; }

function load(){
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e){ state = {}; }
  render();
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ }
}

function toggle(dateStr, lane, habit){
  const key = k(dateStr,lane,habit);
  if(state[key]) delete state[key]; else state[key]=true;
  save(); render();
}

function dailyStreak(){
  let streak=0; const d=new Date(); d.setHours(0,0,0,0);
  for(let i=0;i<365;i++){
    const ds=iso(d); let any=false;
    LANES.forEach(l=>l.habits.forEach(h=>{ if(state[k(ds,l.id,h)]) any=true; }));
    if(any) streak++;
    else if(i===0){ }
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function weekStats(offset){
  const dates=weekDates(offset); let done=0,total=0;
  LANES.forEach(l=>l.habits.forEach(h=>{
    dates.forEach(dt=>{ total++; if(state[k(iso(dt),l.id,h)]) done++; });
  }));
  return {done,total,pct: total? Math.round(done/total*100):0};
}

function laneWeekPct(lane, offset){
  const dates=weekDates(offset); let done=0,total=0;
  lane.habits.forEach(h=>dates.forEach(dt=>{ total++; if(state[k(iso(dt),lane.id,h)]) done++; }));
  return total? Math.round(done/total*100):0;
}

function gymCountThisWeek(){
  const dates=weekDates(0); let c=0;
  dates.forEach(dt=>{ if(state[k(iso(dt),'basics','Gym')]) c++; });
  return c;
}

function daysSinceLane(laneId){
  const d=new Date(); d.setHours(0,0,0,0);
  const lane=LANES.find(l=>l.id===laneId);
  for(let i=0;i<30;i++){
    const ds=iso(d); let any=false;
    lane.habits.forEach(h=>{ if(state[k(ds,laneId,h)]) any=true; });
    if(any) return i;
    d.setDate(d.getDate()-1);
  }
  return 30;
}

function nextAction(){
  const dealGap = daysSinceLane('deal');
  const gym = gymCountThisWeek();
  const w = weekStats(0);
  const todayName = new Date().toLocaleDateString('en-GB',{weekday:'long'});
  if(dealGap >= 3)
    return 'The distribution deal is your time-sensitive lane — no activity in '+dealGap+' days. Do one supplier-list task today before anything else.';
  if(w.total>0 && w.pct===0)
    return 'Fresh week. Start small — tick just one habit today to get momentum going.';
  if(gym < 3 && (new Date().getDay()===0 || new Date().getDay()>=4))
    return 'Gym is at '+gym+'/3 this week. Fit one more session in before the week ends.';
  const worst = LANES.map(l=>({l, pct: laneWeekPct(l, 0)})).sort((a,b)=>a.pct-b.pct)[0];
  if(worst && worst.pct < 40)
    return 'Your weakest lane this week is '+worst.l.title.toLowerCase()+' ('+worst.pct+'%). Give it one action today.';
  if(w.pct >= 70)
    return 'Strong week — '+w.pct+'% done. Keep the streak alive with today\u2019s '+todayName+' tasks.';
  return 'Steady progress. Pick your top lane and do one concrete thing today.';
}

function render(){
  const app=document.getElementById('app');
  const now=new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'});

  const dates=weekDates(weekOffset);
  const todayStr=iso(new Date());
  const w=weekStats(weekOffset);
  const streak=dailyStreak();

  const fmt=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const dayLbls=['Mo','Tu','We','Th','Fr','Sa','Su'];

  let html='';
  html+='<div class="next-card"><div class="next-label">What to do next</div><div class="next-text">'+nextAction()+'</div></div>';

  html+='<div class="stats">'
    +'<div class="stat"><div class="num">'+w.done+'</div><div class="lbl">done this week</div></div>'
    +'<div class="stat"><div class="num">'+w.pct+'%</div><div class="lbl">completion</div></div>'
    +'<div class="stat"><div class="num">'+streak+'</div><div class="lbl">day streak</div></div>'
    +'</div>';

  html+='<div class="weeknav"><button data-nav="-1">\u2190 prev</button>'
    +'<span class="weeklabel">'+fmt(dates[0])+' \u2013 '+fmt(dates[6])
    +(weekOffset===0?' \u00b7 this week':'')+'</span>'
    +'<button data-nav="1">next \u2192</button></div>';

  LANES.forEach(l=>{
    html+='<div class="lane">';
    html+='<div class="lane-head"><span class="dot" style="background:'+l.color+'"></span>'
      +'<span class="lane-title" style="color:'+l.color+'">'+l.title+'</span>'
      +'<span class="lane-pct">'+laneWeekPct(l,weekOffset)+'%</span></div>';
    html+='<div class="dayhead"><span></span>'+dayLbls.map(x=>'<span>'+x+'</span>').join('')+'</div>';
    l.habits.forEach(h=>{
      html+='<div class="habit"><span class="habit-name">'+h+'</span>';
      dates.forEach(dt=>{
        const ds=iso(dt); const on=!!state[k(ds,l.id,h)]; const isToday=ds===todayStr;
        html+='<div class="box'+(on?' on':'')+(isToday?' today':'')+'" '
          +'style="'+(on?'background:'+l.bg+';border-color:'+l.color+';':'')+'" '
          +'data-d="'+ds+'" data-l="'+l.id+'" data-h="'+h.replace(/"/g,'&quot;')+'">'
          +CHECK.replace('COLORVAR', l.color)+'</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });

  app.innerHTML=html;

  app.querySelectorAll('.box').forEach(b=>{
    b.addEventListener('click',()=>toggle(b.dataset.d,b.dataset.l,b.dataset.h));
  });
  app.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click',()=>{ weekOffset+=parseInt(btn.dataset.nav); render(); });
  });
}

document.getElementById('reset-btn').addEventListener('click',()=>{
  if(confirm('Erase all saved check-ins? This cannot be undone.')){
    state={};
    try{ localStorage.removeItem(KEY); }catch(e){}
    weekOffset=0; render();
  }
});

load();
</script>
</body>
</html>
